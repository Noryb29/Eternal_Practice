<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <link rel="stylesheet" href="styles/story.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <title>Main Title</title>
</head>

<body>

    <header class="navbar">
        <div class="navbar__container">
            <a href="#" class="navbar__brand"></a>

            <button class="navbar__toggle" id="navbarToggle" aria-label="Toggle navigation" aria-controls="navbarMenu"
                aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav id="navbarMenu" class="navbar__menu" role="navigation">
                <ul class="navbar__list">
                    <li class="navbar__item">
                        <a href="#" class="navbar__link">Home</a>
                    </li>

                    <li class="navbar__item">
                        <a href="#" class="navbar__link">About</a>
                    </li>

                    <li class="navbar__item">
                        <a href="#" class="navbar__link">Services</a>
                    </li>

                    <li class="navbar__item">
                        <a href="#" class="navbar__link navbar__link--cta">Contact</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <aside class="sidebar">
        <h1 id="sidebarH1">Story Generator Site</h1>
        <nav>
            <ul>
                <li><a href="story.html">The Story so Far</a></li>
                <li><a href="characters.html">Characters</a></li>
                <li><a href="">Locations</a></li>
                <li><a href="">Planned Plots</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main">
        <h1 class="page-title">Story Builder</h1>

        <div class="inputs">

            <!-- INPUT SECTION -->
            <div class="card">
                <div class="cardh2">
                    <h2>Write a Story</h2>
                    <button style="margin-bottom: 20px;" id="openModal">Add a Character</button>
                </div>


                <form id="storyForm">

                    <label>Story Title</label>
                    <input type="text" id="storyTitle">

                    <label>Chapter Title</label>
                    <input type="text" id="chapterTitle">

                    <label>Story Content</label>

                    <div class="storyTextContainer">
                        <textarea id="storyInput" class="storyText"></textarea>

                        <button type="button" onclick="addStory()">
                            Add to Story
                        </button>
                    </div>

                </form>

                <!-- CHARACTERS -->
                <div class="card">
                    <h2>Characters</h2>

                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Race</th>
                                <th>Location</th>
                                <th>Gender</th>
                                <th>Backstory</th>
                            </tr>
                        </thead>
                        <tbody id="characterTable"></tbody>
                    </table>

                    <button id="openModal">Add a Character</button>

                    <dialog id="addCharacterModal" class="addCharacterModal">
                        <h2>Add a Character</h2>

                        <form class="addCharacterForm">

                            <div>
                                <label for="charName">Character Name</label>
                                <input type="text" name="charName" id="charName">
                            </div>

                            <div>
                                <label for="charRole">Character Role</label>
                                <input type="text" name="charRole" id="charRole">
                            </div>

                            <div>
                                <label for="charRace">Character Race</label>
                                <input type="text" name="charRace" id="charRace">
                            </div>

                            <div>
                                <label for="charLocation">Character Location</label>
                                <input type="text" name="charLocation" id="charLocation">
                            </div>

                            <div>
                                <label for="charGender">Character Gender</label>
                                <input type="text" name="charGender" id="charGender">
                            </div>

                            <div class="full-width">
                                <label for="charBackstory">Character Backstory</label>
                                <textarea class="charBackstory" name="charBackstory" id="charBackstory"></textarea>
                            </div>

                            <div class="modalActions">
                                <button type="submit" class="modalBtn saveBtn">
                                    Save Character
                                </button>

                                <button type="button" id="closeModalButton" class="modalBtn closeBtn">
                                    Close
                                </button>
                            </div>

                        </form>
                    </dialog>
                </div>

            </div>

            <div class="card">
                <h2>The Story So Far</h2>
                <textarea id="storyTextContainer" class="allStoryText"></textarea>
                <div class="paginationControls">
                    <button type="button" onclick="prevPage()">Previous</button>
                    <span id="pageInfo">Page 1</span>
                    <button type="button" onclick="nextPage()">Next</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // simple state tracker
        let storyTitleSet = false;
        let chapterTitleSet = false;

        // pagination system
        let pages = [];
        let currentPage = 0;
        const wordsPerPage = 80; // adjust pagination size here

        function updateStoryView() {
            const storyOutput = document.getElementById("storyTextContainer");
            const pageInfo = document.getElementById("pageInfo");

            if (pages.length === 0) {
                storyOutput.value = "";
                pageInfo.innerText = "Page 0";
                return;
            }

            storyOutput.value = pages[currentPage];
            pageInfo.innerText = `Page ${currentPage + 1} of ${pages.length}`;
        }

        function addStory() {

            const titleInput = document.getElementById("storyTitle");
            const chapterInput = document.getElementById("chapterTitle");
            const storyInput = document.getElementById("storyInput");

            const title = titleInput.value.trim();
            const chapter = chapterInput.value.trim();
            const text = storyInput.value.trim();

            if (!storyTitleSet && !chapterTitleSet) {

                if (!title || !chapter) {
                    alert("Please enter both Story Title and Chapter Title first.");
                    return;
                }

                storyTitleSet = true;
                chapterTitleSet = true;

                pages.push(`=== ${title} ===\n--- ${chapter} ---\n\n`);
            }

            if (storyTitleSet) {
                titleInput.disabled = true;
                chapterInput.disabled = true;
            }

            if (text) {
                // append text into last page or create new page if full
                let lastPage = pages[pages.length - 1] || "";

                const newContent = lastPage + text + ". ";

                const words = newContent.split(" ");

                if (words.length > wordsPerPage) {
                    pages.push(text + ". ");
                    currentPage = pages.length - 1;
                } else {
                    pages[pages.length - 1] = newContent;
                }

                storyInput.value = "";
                updateStoryView();
            }
        }

        function nextPage() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                updateStoryView();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                updateStoryView();
            }
        }

        const modal = document.querySelector("#addCharacterModal")
        const openModalButton = document.querySelector("#openModal")
        const closeModalButton = document.querySelector("#closeModalButton")

        openModalButton.addEventListener("click", () => {
            modal.showModal()
        });

        closeModalButton.addEventListener("click", () => {
            modal.close();
        })
    </script>

</body>

</html>
